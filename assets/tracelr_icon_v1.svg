<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="140 140 400 400">
  <defs>
    <clipPath id="iconClip">
      <rect x="140" y="140" width="400" height="400" rx="80"/>
    </clipPath>

    <linearGradient id="g_teal_outer" gradientUnits="userSpaceOnUse" x1="200" y1="480" x2="440" y2="160">
      <stop offset="0" stop-color="#038182" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#038182" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00A4A5" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="g_teal_mid" gradientUnits="userSpaceOnUse" x1="200" y1="480" x2="440" y2="160">
      <stop offset="0" stop-color="#038182" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#00A4A5" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#18E4E3" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="g_teal_core" gradientUnits="userSpaceOnUse" x1="200" y1="480" x2="440" y2="160">
      <stop offset="0" stop-color="#00A4A5" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#00A4A5" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#18E4E3" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="g_cyan_outer" gradientUnits="userSpaceOnUse" x1="160" y1="460" x2="520" y2="240">
      <stop offset="0" stop-color="#23ADAB" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#23ADAB" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#18E4E3" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="g_cyan_mid" gradientUnits="userSpaceOnUse" x1="160" y1="460" x2="520" y2="240">
      <stop offset="0" stop-color="#23ADAB" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#18E4E3" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5FFFFF" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="g_cyan_core" gradientUnits="userSpaceOnUse" x1="160" y1="460" x2="520" y2="240">
      <stop offset="0" stop-color="#18E4E3" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#18E4E3" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#5FFFFF" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="g_bcyan_outer" gradientUnits="userSpaceOnUse" x1="180" y1="520" x2="530" y2="285">
      <stop offset="0" stop-color="#00E5E5" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#00E5E5" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#00FFFF" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="g_bcyan_mid" gradientUnits="userSpaceOnUse" x1="180" y1="520" x2="530" y2="285">
      <stop offset="0" stop-color="#00E5E5" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#00FFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7FFFFF" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="g_bcyan_core" gradientUnits="userSpaceOnUse" x1="180" y1="520" x2="530" y2="285">
      <stop offset="0" stop-color="#00FFFF" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#00FFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7FFFFF" stop-opacity="1"/>
    </linearGradient>

    <linearGradient id="g_orange_outer" gradientUnits="userSpaceOnUse" x1="175" y1="540" x2="490" y2="175">
      <stop offset="0" stop-color="#D7772C" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#D7772C" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#FF9436" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="g_orange_mid" gradientUnits="userSpaceOnUse" x1="175" y1="540" x2="490" y2="175">
      <stop offset="0" stop-color="#D7772C" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#FF9436" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFB86C" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="g_orange_core" gradientUnits="userSpaceOnUse" x1="175" y1="540" x2="490" y2="175">
      <stop offset="0" stop-color="#FF9436" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#FF9436" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFB86C" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="140" y="140" width="400" height="400" rx="80" fill="#191E25"/>

  <g clip-path="url(#iconClip)">
    <!-- Subtle grid (bottom-left) -->
    <g stroke="#06B6D4" stroke-width="0.5" opacity="0.06" fill="none">
      <line x1="140" y1="450" x2="320" y2="450"/>
      <line x1="140" y1="490" x2="320" y2="490"/>
      <line x1="140" y1="530" x2="320" y2="530"/>
      <line x1="200" y1="400" x2="200" y2="540"/>
      <line x1="240" y1="400" x2="240" y2="540"/>
      <line x1="280" y1="400" x2="280" y2="540"/>
    </g>

    <!-- Bright cyan adjusted -->
    <path d="M180 520 Q240 440 300 380 Q360 330 420 310 Q475 295 530 285" fill="none" stroke="url(#g_bcyan_outer)" stroke-width="40" stroke-linecap="round"/>
    <path d="M180 520 Q240 440 300 380 Q360 330 420 310 Q475 295 530 285" fill="none" stroke="url(#g_bcyan_mid)" stroke-width="18" stroke-linecap="round"/>
    <path d="M180 520 Q240 440 300 380 Q360 330 420 310 Q475 295 530 285" fill="none" stroke="url(#g_bcyan_core)" stroke-width="6" stroke-linecap="round"/>

    <!-- Cyan -->
    <path d="M160 460 Q220 400 260 360 Q320 300 380 280 Q440 260 520 240" fill="none" stroke="url(#g_cyan_outer)" stroke-width="40" stroke-linecap="round"/>
    <path d="M160 460 Q220 400 260 360 Q320 300 380 280 Q440 260 520 240" fill="none" stroke="url(#g_cyan_mid)" stroke-width="18" stroke-linecap="round"/>
    <path d="M160 460 Q220 400 260 360 Q320 300 380 280 Q440 260 520 240" fill="none" stroke="url(#g_cyan_core)" stroke-width="6" stroke-linecap="round"/>

    <!-- Teal -->
    <path d="M200 480 Q260 380 280 320 Q300 260 340 220 Q380 180 440 160" fill="none" stroke="url(#g_teal_outer)" stroke-width="40" stroke-linecap="round"/>
    <path d="M200 480 Q260 380 280 320 Q300 260 340 220 Q380 180 440 160" fill="none" stroke="url(#g_teal_mid)" stroke-width="18" stroke-linecap="round"/>
    <path d="M200 480 Q260 380 280 320 Q300 260 340 220 Q380 180 440 160" fill="none" stroke="url(#g_teal_core)" stroke-width="6" stroke-linecap="round"/>

    <!-- Orange 4th (smooth cubic, on top) -->
    <path d="M175 540 C320 515, 440 305, 490 175" fill="none" stroke="url(#g_orange_outer)" stroke-width="40" stroke-linecap="round"/>
    <path d="M175 540 C320 515, 440 305, 490 175" fill="none" stroke="url(#g_orange_mid)" stroke-width="18" stroke-linecap="round"/>
    <path d="M175 540 C320 515, 440 305, 490 175" fill="none" stroke="url(#g_orange_core)" stroke-width="6" stroke-linecap="round"/>

    <!-- Endpoint dots: bright cyan -->
    <circle cx="530" cy="285" r="24" fill="#00FFFF" opacity="0.2"/>
    <circle cx="530" cy="285" r="14" fill="#00E5E5"/>
    <circle cx="530" cy="285" r="14" fill="none" stroke="#7FFFFF" stroke-width="2.5"/>

    <!-- cyan -->
    <circle cx="520" cy="240" r="24" fill="#18E4E3" opacity="0.2"/>
    <circle cx="520" cy="240" r="14" fill="#23ADAB"/>
    <circle cx="520" cy="240" r="14" fill="none" stroke="#5FFFFF" stroke-width="2.5"/>

    <!-- teal -->
    <circle cx="440" cy="160" r="24" fill="#18E4E3" opacity="0.2"/>
    <circle cx="440" cy="160" r="14" fill="#00A4A5"/>
    <circle cx="440" cy="160" r="14" fill="none" stroke="#18E4E3" stroke-width="2.5"/>

    <!-- orange (on top) -->
    <circle cx="490" cy="175" r="24" fill="#FF9436" opacity="0.2"/>
    <circle cx="490" cy="175" r="14" fill="#FF9436"/>
    <circle cx="490" cy="175" r="14" fill="none" stroke="#FFB86C" stroke-width="2.5"/>
  </g>

  <!-- Border -->
  <rect x="140" y="140" width="400" height="400" rx="80" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.06"/>
</svg>
